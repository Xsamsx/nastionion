<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1E3A2F">
<style>
/* TEST HOST: the :host selector Tailwind uses */
html,:host{
  -webkit-text-size-adjust:100%;
  tab-size:4;
  line-height:1.5;
  -webkit-tap-highlight-color:transparent;
}
*{margin:0;padding:0}
html,body{background:#1E3A2F;min-height:100%}
.section{min-height:100vh;display:flex;align-items:center;justify-content:center;color:#F5F2ED;font-family:system-ui;font-size:1.5rem}
.s1{background:#1E3A2F}
.s2{background:#F5F2ED;color:#1A1A1A}
.s3{background:#7D9B84}
.s4{background:#6B2D3C}
</style>
</head>
<body>
<div class="section s1"><h1>TEST HOST: html,:host selector</h1></div>
<div class="section s2"><h1>Section 2 - Cream</h1></div>
<div class="section s3"><h1>Section 3 - Sage</h1></div>
<div class="section s4"><h1>Section 4 - Burgundy</h1></div>
</body>
</html>
