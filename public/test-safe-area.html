<!DOCTYPE html>
<html lang="en" style="background: #1E3A2F;">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1E3A2F">
  <title>Safe Area Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: #1E3A2F;
      min-height: 100%;
      min-height: 100dvh;
    }
    .content {
      min-height: 100dvh;
      padding: 20px;
      padding-top: calc(20px + env(safe-area-inset-top));
      padding-bottom: calc(20px + env(safe-area-inset-bottom));
      padding-left: calc(20px + env(safe-area-inset-left));
      padding-right: calc(20px + env(safe-area-inset-right));
      color: #F5F2ED;
      font-family: system-ui;
    }
    h1 { font-size: 2rem; margin-bottom: 1rem; }
    .box {
      background: #6B2D3C;
      padding: 20px;
      border-radius: 12px;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="content">
    <h1>Safe Area Test</h1>
    <p>If you see white bars at top/bottom, the issue is Safari settings.</p>
    <p>If this is fully green edge-to-edge, the issue is in the Astro build.</p>
    <div class="box">
      <p>This burgundy box should have safe padding applied.</p>
    </div>
  </div>
</body>
</html>
