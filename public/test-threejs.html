<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1E3A2F">
<style>
*{margin:0;padding:0}
html,body{background:#1E3A2F;min-height:100%}
.section{min-height:100vh;display:flex;align-items:center;justify-content:center;color:#F5F2ED;font-family:system-ui;font-size:1.5rem;position:relative;overflow:hidden}
.s1{background:#1E3A2F}
.s2{background:#F5F2ED;color:#1A1A1A}
.s3{background:#7D9B84}
.s4{background:#6B2D3C}
canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
h1{position:relative;z-index:10}
</style>
</head>
<body>
<div class="section s1">
  <canvas id="three-canvas"></canvas>
  <h1>TEST THREE.JS: WebGL canvas</h1>
</div>
<div class="section s2"><h1>Section 2 - Cream</h1></div>
<div class="section s3"><h1>Section 3 - Sage</h1></div>
<div class="section s4"><h1>Section 4 - Burgundy</h1></div>
<script type="module">
import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
const canvas = document.getElementById('three-canvas');
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({canvas, alpha: true});
renderer.setSize(window.innerWidth, window.innerHeight);
const geometry = new THREE.IcosahedronGeometry(2, 0);
const material = new THREE.MeshStandardMaterial({color: 0xC67D5E, roughness: 0.3});
const mesh = new THREE.Mesh(geometry, material);
scene.add(mesh);
const light = new THREE.DirectionalLight(0xffffff, 2);
light.position.set(5,10,5);
scene.add(light);
scene.add(new THREE.AmbientLight(0xffffff, 0.5));
camera.position.z = 5;
function animate() {
  requestAnimationFrame(animate);
  mesh.rotation.x += 0.01;
  mesh.rotation.y += 0.01;
  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
