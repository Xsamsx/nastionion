<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1E3A2F">
<style>
/* Tailwind preflight */
html,:host{-webkit-text-size-adjust:100%;tab-size:4;line-height:1.5;-webkit-tap-highlight-color:transparent}
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:#1E3A2F;min-height:100%}
.section{min-height:100vh;display:flex;align-items:center;justify-content:center;color:#F5F2ED;font-family:system-ui;font-size:1.5rem}
.s1{background:#1E3A2F}
.s2{background:#F5F2ED;color:#1A1A1A}
.s3{background:#7D9B84}
.s4{background:#6B2D3C}
.grain{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:9999;opacity:0.15;mix-blend-mode:overlay;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
</style>
</head>
<body>
<div class="grain"></div>
<div class="section s1"><h1>TEST: Tailwind + Grain overlay</h1></div>
<div class="section s2"><h1>Section 2</h1></div>
<div class="section s3"><h1>Section 3</h1></div>
<div class="section s4"><h1>Section 4</h1></div>
</body>
</html>
